name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  id-token: write
  contents: write

jobs:
  build:
    name: "Build ${{ matrix.goos }}"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    env:
      GOARCH: amd64
    strategy:
      fail-fast: true
      matrix:
        goos:
          - "linux"
          - "windows"
          - "darwin"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: "1.25"
      - name: "Go Build"
        if: ${{ matrix.goos != 'windows' }}
        run: GOOS=${{ matrix.goos }} go build -v -trimpath -o mstodoexport-${{ matrix.goos }}-amd64
      - name: "Go Build Windows"
        if: ${{ matrix.goos == 'windows' }}
        run: GOOS=${{ matrix.goos }} go build -v -trimpath -o mstodoexport-${{ matrix.goos }}-amd64.exe
      - name: "Upload Artifact"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: mstodoexport-${{ matrix.goos }}-amd64
          path: mstodoexport-*
          if-no-files-found: error
          retention-days: 1

  release:
    name: "Create Release"
    runs-on: "ubuntu-latest"
    needs: build
    timeout-minutes: 10
    steps:
      - name: "Download All Artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: release
          merge-multiple: true
      - name: "Generate Checksums"
        run: |
          cd release
          sha256sum mstodoexport-* > SHA256SUMS
          md5sum mstodoexport-* > MD5SUMS
      - name: "Create Release"
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          files: ./release/*
