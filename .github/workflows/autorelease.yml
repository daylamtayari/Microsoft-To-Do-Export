name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  id-token: write
  contents: write

jobs:
  build:
    name: "Build ${{ matrix.goos }}"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    env:
      GOARCH: amd64
    strategy:
      fail-fast: true
      matrix:
        goos:
          - "linux"
          - "windows"
          - "darwin"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: "1.25"
      - name: "Go Build"
        if: ${{ matrix.goos != 'windows' }}
        run: GOOS=${{ matrix.goos }} go build -v -trimpath -o mstodoexport-${{ matrix.goos }}-amd64
      - name: "Go Build Windows"
        if: ${{ matrix.goos == 'windows' }}
        run: GOOS=${{ matrix.goos }} go build -v -trimpath -o mstodoexport-${{ matrix.goos }}-amd64.exe
      - name: "Upload Artifact"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mstodoexport-${{ matrix.goos }}-amd64
          path: mstodoexport-*
          if-no-files-found: error
          retention-days: 1

  release:
    name: "Create Release"
    runs-on: "ubuntu-latest"
    needs: build
    timeout-minutes: 10
    steps:
      - name: "Download All Artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: release
          merge-multiple: true
      - name: "Generate Checksums"
        run: |
          cd release
          sha256sum mstodoexport-* > SHA256SUMS
          md5sum mstodoexport-* > MD5SUMS
      - name: "Create Release"
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          files: ./release/*
